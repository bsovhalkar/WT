<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validation Error</title>
</head>
<body>
  <h1>Submission error</h1>
  <p>Please fix the following:</p>
  <ul>
    {% for error in errors %}
      <li>{{ error }}</li>
    {% endfor %}
  </ul>
  <p><a href="/">Go back to form</a></p>
</body>
</html>
